name: QIRA ReleaseGate Dry Run

on:
  workflow_dispatch:
    inputs:
      packet:
        description: Path to a committed QIRA task packet JSON file
        required: true
        default: public_launch/qira4/QIRA4_SAMPLE_ACTION_PACKET.json

jobs:
  qira-releasegate-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package locally
        run: python -m pip install -e .
      - name: QIRA dry run
        uses: ./.github/actions/qira-releasegate-dry-run
        with:
          packet: ${{ inputs.packet }}
          output-dir: public_launch/qira4
